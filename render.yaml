services:
  - type: web
    # Use unique Render resource names so a fresh account can create new resources
    # even if the old trial app still exists.
    name: alikhan005-syllabus
    runtime: python
    plan: free
    branch: main
    rootDir: .
    autoDeployTrigger: commit
    buildCommand: bash ./deploy/render-build.sh
    startCommand: bash ./deploy/render-start.sh
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_MEDIA_ROOT
        value: "/var/data/media"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "True"
      - key: DJANGO_X_FRAME_OPTIONS
        value: "DENY"
      - key: AI_WORKER_PRELOAD_MODEL
        value: "false"
      - key: AI_WORKER_IDLE_SLEEP
        value: "1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: alikhan005-syllabus-db
          property: connectionString
    disk:
      name: alikhan005-syllabus-media
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: alikhan005-syllabus-db
    plan: free
    databaseName: almau_syllabus
    user: almau_syllabus
